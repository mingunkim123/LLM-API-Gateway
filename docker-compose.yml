# docker-compose.yml
version: '3.8'
services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: gateway1234
      POSTGRES_DB: llm_gateway
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: